[platformio]
src_dir = .

[env:prototype0_profile0_external]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
build_flags =
    -Iapp
    -Ibms_boards
    -Ibms_core
    -Ibms_hal
    -Ibms_platform/esp32
    -D BMS_BOARD_CONFIG_FILE=\"prototype0_profile0/bms_board_profile.h\"
build_src_filter =
    +<app/*.cpp>
    +<bms_core/*.cpp>
    +<bms_platform/esp32/*.cpp>
